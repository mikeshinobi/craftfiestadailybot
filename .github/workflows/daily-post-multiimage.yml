name: Daily WordPress Post

on:
  schedule:
    # Runs at 13:00 UTC every day (~9am US Eastern). Edit the cron to taste.
    - cron: "15 13 * * *"
  workflow_dispatch: {}  # lets you also trigger it manually from the Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the daily post script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          POST_STATUS: publish
          SITE_TOPIC: "Arts and crafts, craft ideas"
          SITE_VOICE: "like a knowledgeable friend texting you a tip, a little wry, not afraid to admit when something's annoying or overrated"
          SITE_INSTRUCTIONS: |
            - At least some of the time, try to think of more a "niche" topic that someone might search for, and then give them what they're looking for. For example, if the theme was gardening, you might do something about how to deal with a specific problem with a specific flower, things like that.
            - Vary the structure between posts -- don't always use the same intro/body/conclusion shape or always reach for a bulleted list.
            - If possible, try to sometimes make the post an idea for a specific craft, with steps showing how to make the craft and an image showing the progress with each step. You'll need to ensure the images are cohesive, ie. it should look like the same craft project progressing over time, not a completely different craft in each image, or it will look weird.
            - Craft idea "listicles" are okay too, eg. "10 fun crafts to make for Halloween". Ensure the ideas are realistic and physically/humanly possible.
            - Avoid starting posts with a rhetorical question or a "we've all been there" style opener.
            - Never use generic transitional phrases like "in today's world," "it's important to note," "let's dive in," or similar filler openers.
            - Don't hedge every claim with counterpoints -- commit to a point of view where reasonable
            - Vary sentence length noticeably -- mix short, punchy sentences with longer ones. Avoid uniform paragraph lengths.
            - Try not to end the post title with something in parentheses too often
        run: python generate_daily_post_multiimage.py
